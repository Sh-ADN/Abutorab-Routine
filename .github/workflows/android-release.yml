name: Android Release Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Generate release keystore
      run: keytool -genkey -v -keystore my-upload-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias upload -dname "CN=Android Debug,O=Android,C=US" -storepass android -keypass android

    - name: Build Release APK
      env:
        KEYSTORE_PATH: "my-upload-key.jks"
        STORE_PASSWORD: "android"
        KEY_PASSWORD: "android"
      run: gradle assembleRelease

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: app/build/outputs/apk/release/app-release-unsigned.apk # Or app-release.apk if signed
