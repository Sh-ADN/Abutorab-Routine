name: Android Release Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Generate release keystore
      run: keytool -genkey -v -keystore my-upload-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias upload -dname "CN=Android Debug,O=Android,C=US" -storepass android -keypass android

    - name: Build Release APK
      env:
        STORE_PASSWORD: "android"
        KEY_PASSWORD: "android"
      run: gradle assembleRelease

    - name: Generate Release Tag
      id: tag
      run: echo "RELEASE_TAG=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        name: Abutorab Routine ${{ env.RELEASE_TAG }}
        files: app/build/outputs/apk/release/app-release*.apk
        body: |
          How to install:

          1. Download the APK file below
          2. Open it on your Android phone
          3. If asked, allow "Install from unknown sources"
          4. Install and enjoy!
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

