name: Android Release Build

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Fix build.gradle.kts
        run: |
          sed -i 's/isShrinkResources = false/isShrinkResources = true/g' app/build.gradle.kts
          sed -i 's/keyAlias = "upload"/keyAlias = "androiddebugkey"/g' app/build.gradle.kts
          sed -i 's/namespace = "com.example"/namespace = "com.abutorab.routine"/g' app/build.gradle.kts
          sed -i 's/applicationId = "com.example"/applicationId = "com.abutorab.routine"/g' app/build.gradle.kts
          echo "=== build.gradle.kts after fixes ==="
          grep -n "isShrinkResources\|keyAlias\|namespace\|applicationId" app/build.gradle.kts

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > my-upload-key.jks

      - name: Build Release APK
        run: gradle assembleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/my-upload-key.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Generate Release Tag
        id: tag
        run: echo "RELEASE_TAG=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Abutorab Routine ${{ env.RELEASE_TAG }}
          make_latest: true
          files: app/build/outputs/apk/release/app-release*.apk
          body: |
            📱 Abutorab M.L. High School Routine App

            How to install:
            1. Download the APK file below
            2. Open it on your Android phone
            3. If asked, allow "Install from unknown sources"
            4. Install and enjoy!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}